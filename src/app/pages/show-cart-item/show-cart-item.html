<div class="grid grid-cols-[3fr_1fr_1fr]">
 <div class="flex justify-start align-center gap-4">
  <img [src]="item().product.imageUrl" alt="product-image" class="w-24 rounded-lg object-cover">
  <div class="flex flex-col justify-center">
   <div class="text-gray-900 text-lg font-semibold"> {{ item().product.name }} </div>
   <div class="text-gray-900 text-lg"> $ {{ item().product.price }} </div>
  </div>
 </div>

 <div class="">
  <app-qty-selector [quantity]="item().quantity" (quantityUpdated)="quantityUpdated($event)" />
 </div>
 
 <div class="flex flex-col items-end">
  <div class="text-right font-semibold text-lg">
   $ {{ total() }}
  </div>
  <div class="flex -me-3">
   <button matIconButton (click)="store.moveToWishlist(item().product)">
    <mat-icon>favorite_border</mat-icon>
   </button>
   <button matIconButton class="danger" (click)="store.removeFromCart(item().product)">
    <mat-icon>delete</mat-icon>
   </button>
  </div>
 </div>
</div>
