   <div class="relative bg-white cursor-pointer rounded-xl shadow-lg overflow-hidden flex flex-col h-full">
    <img [src]="product().imageUrl" alt="product-image"
    class="w-full h-75 object-cover rounded-t-xl">

    <button class="absolute! z-10 top-3 right-3 w-10 h-10 rounded-full bg-white! border-0 shadow-md flex items-center justify-center cursor-pointer transition-all duration-200 hover:scale-110 hover:shadow-lg" matIconButton
    (click)="toggleWishList(product())"
    [class]="isInWishlist() ? 'text-red-500!' :  'text-gray-400!' ">
      <mat-icon> {{ isInWishlist() ? 'favorite' : 'favorite_border' }} </mat-icon>
    </button>

    <div class="p-5 flex flex-col flex-1">
     <h3 class="text-lg font-semibold text-gray-900 pb-2 leading-tight">
      {{ product().name }}
     </h3>
     <div class="text-sm text-gray-600 pb-4 flex-1 leading-relaxed">
      {{ product().description }}
     </div>
     <!-- //Add rating -->
      <div class="text-sm font-medium pb-4">
       {{ product().inStock ? "In Stock" : "Out of Stock" }}
      </div>

      <div class="flex items-center justify-between mt-auto">
       <span class="text-2xl font-bold text-gray-900 text-ellipsis">${{ product().price }}</span>
       <button matButton="filled" class="flex items-center gap-2">
        <mat-icon>shopping_cart</mat-icon>
        Add to Cart
       </button>
      </div>
    </div>
   </div>
